<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1240" width="1600" height="1240" font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <radialGradient id="lift" cx="50%" cy="28%" r="82%">
      <stop offset="0%" stop-color="#F5F6F7"/><stop offset="100%" stop-color="#EEEFF2"/>
    </radialGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.1" fill="#181F2F" opacity="0.05"/>
    </pattern>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 z" fill="#9AA2B1"/></marker>
    <marker id="arc" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 z" fill="#1D4FD7"/></marker>
    <marker id="arg" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 z" fill="#8B93A3"/></marker>
    <filter id="sh" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#181F2F" flood-opacity="0.07"/></filter>
    <filter id="shl" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#181F2F" flood-opacity="0.16"/></filter>
  </defs>

  <rect width="1600" height="1240" fill="url(#lift)"/>
  <rect width="1600" height="1240" fill="url(#dots)"/>

  <!-- title -->
  <text x="80" y="62" font-size="12" font-weight="600" letter-spacing="2.2" fill="#1D4FD7">RETRIEVAL · ORCHESTRATION · EVALUATION</text>
  <text x="80" y="104" font-size="34" font-weight="640" fill="#181F2F">GenAI Stack Copilot</text>
  <text x="80" y="134" font-size="15" fill="#5A6478">A LangGraph pipeline that grades its own retrieval — and refuses rather than guess.</text>

  <!-- ============ MAIN GRAPH ============ -->
  <rect x="80" y="168" width="1000" height="700" rx="14" fill="#FFFFFF" fill-opacity="0.5" stroke="#DCE0E7" stroke-width="1.2"/>
  <text x="108" y="200" font-size="10.5" font-weight="700" letter-spacing="1.6" fill="#8B93A3">LANGGRAPH · ANSWER PATH</text>

  <rect x="430" y="220" width="300" height="46" rx="9" fill="#FFFFFF" stroke="#D8DBE1" filter="url(#sh)"/>
  <text x="580" y="248" font-size="13.5" font-weight="600" fill="#181F2F" text-anchor="middle">Question</text>

  <path d="M580,268 L580,296" fill="none" stroke="#9AA2B1" stroke-width="1.6" marker-end="url(#ar)"/>

  <rect x="410" y="300" width="340" height="62" rx="10" fill="#181F2F" filter="url(#shl)"/>
  <text x="580" y="326" font-size="15" font-weight="640" fill="#FFFFFF" text-anchor="middle">route · supervisor</text>
  <text x="580" y="346" font-size="11.5" fill="#FFFFFF" fill-opacity="0.66" text-anchor="middle">in-corpus? · thinking off</text>

  <path d="M580,364 L580,398" fill="none" stroke="#9AA2B1" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="600" y="386" font-size="11" font-weight="600" fill="#8B93A3">retrieve</text>

  <rect x="330" y="402" width="500" height="112" rx="10" fill="#FFFFFF" stroke="#1D4FD7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="352" y="428" font-size="13.5" font-weight="640" fill="#1D4FD7">retrieve · Azure AI Search</text>
  <text x="352" y="450" font-size="11.5" fill="#5A6478">BM25 over title · heading · content</text>
  <text x="352" y="469" font-size="11.5" fill="#5A6478">HNSW / cosine over 384-d vectors</text>
  <text x="352" y="488" font-size="11.5" fill="#5A6478">fused server-side by Reciprocal Rank Fusion</text>
  <text x="352" y="505" font-size="11.5" font-weight="600" fill="#248252">+ semantic reranker (free tier) · degrades to RRF</text>

  <path d="M580,516 L580,548" fill="none" stroke="#9AA2B1" stroke-width="1.6" marker-end="url(#ar)"/>

  <rect x="430" y="552" width="300" height="62" rx="10" fill="#FFFFFF" stroke="#D8DBE1" filter="url(#sh)"/>
  <text x="580" y="577" font-size="13.5" font-weight="620" fill="#181F2F" text-anchor="middle">grade</text>
  <text x="580" y="597" font-size="11.5" fill="#5A6478" text-anchor="middle">do these passages actually answer it?</text>

  <!-- rewrite loop (left) -->
  <path d="M430,583 L300,583 L300,470 L330,470" fill="none" stroke="#1D4FD7" stroke-width="1.6" marker-end="url(#arc)" stroke-dasharray="5 4"/>
  <rect x="120" y="552" width="170" height="62" rx="10" fill="#FFFFFF" stroke="#1D4FD7" stroke-width="1.4" filter="url(#sh)"/>
  <text x="205" y="577" font-size="13" font-weight="620" fill="#1D4FD7" text-anchor="middle">rewrite</text>
  <text x="205" y="596" font-size="11" fill="#5A6478" text-anchor="middle">new query, max 2</text>
  <path d="M430,594 L292,594" fill="none" stroke="#1D4FD7" stroke-width="1.6" marker-end="url(#arc)"/>
  <text x="360" y="638" font-size="11" font-weight="600" fill="#1D4FD7" text-anchor="middle">insufficient</text>

  <!-- synthesize -->
  <path d="M580,616 L580,650" fill="none" stroke="#9AA2B1" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="612" y="640" font-size="11" font-weight="600" fill="#8B93A3">answerable</text>

  <rect x="410" y="654" width="340" height="62" rx="10" fill="#181F2F" filter="url(#shl)"/>
  <text x="580" y="680" font-size="15" font-weight="640" fill="#FFFFFF" text-anchor="middle">synthesize</text>
  <text x="580" y="700" font-size="11.5" fill="#FFFFFF" fill-opacity="0.66" text-anchor="middle">cite-or-omit · thinking dynamic</text>

  <path d="M580,718 L580,748" fill="none" stroke="#9AA2B1" stroke-width="1.6" marker-end="url(#ar)"/>
  <rect x="430" y="752" width="300" height="52" rx="9" fill="#FFFFFF" stroke="#248252" stroke-width="1.5" filter="url(#sh)"/>
  <text x="580" y="774" font-size="13.5" font-weight="640" fill="#248252" text-anchor="middle">Answer + citations</text>
  <text x="580" y="792" font-size="11" fill="#5A6478" text-anchor="middle">only citations the answer actually used</text>

  <!-- refuse (right) -->
  <path d="M750,331 L900,331 L900,470" fill="none" stroke="#8B93A3" stroke-width="1.6" marker-end="url(#arg)"/>
  <text x="828" y="322" font-size="11" font-weight="600" fill="#8B93A3" text-anchor="middle">out of scope</text>
  <path d="M730,583 L900,583 L900,530" fill="none" stroke="#8B93A3" stroke-width="1.6" marker-end="url(#arg)"/>
  <text x="828" y="604" font-size="11" font-weight="600" fill="#8B93A3" text-anchor="middle">retries exhausted</text>

  <rect x="830" y="474" width="220" height="56" rx="10" fill="#FFFFFF" stroke="#8B93A3" stroke-width="1.4" stroke-dasharray="5 4" filter="url(#sh)"/>
  <text x="940" y="497" font-size="13" font-weight="620" fill="#5A6478" text-anchor="middle">refuse</text>
  <text x="940" y="516" font-size="11" fill="#8B93A3" text-anchor="middle">terminal · no model call</text>

  <text x="108" y="838" font-size="11.5" fill="#8B93A3">The cycle is the point: a bad first search costs one cheap re-query, not a confident wrong answer.</text>

  <!-- ============ CAG PANEL ============ -->
  <rect x="1110" y="168" width="410" height="700" rx="14" fill="#FFFFFF" fill-opacity="0.5" stroke="#DCE0E7" stroke-width="1.2"/>
  <text x="1138" y="200" font-size="10.5" font-weight="700" letter-spacing="1.6" fill="#8B93A3">ALTERNATIVE PATH · CAG</text>
  <text x="1138" y="224" font-size="15.5" font-weight="620" fill="#181F2F">No retriever at all</text>

  <rect x="1138" y="244" width="354" height="72" rx="10" fill="#FFFFFF" stroke="#D8DBE1" filter="url(#sh)"/>
  <text x="1158" y="268" font-size="13" font-weight="600" fill="#181F2F">Corpus slice → systemInstruction</text>
  <text x="1158" y="288" font-size="11.5" fill="#5A6478">byte-stable prefix, sent every call</text>
  <text x="1158" y="306" font-size="11.5" fill="#5A6478">~150k tokens · deterministic order</text>

  <path d="M1315,318 L1315,346" fill="none" stroke="#9AA2B1" stroke-width="1.6" marker-end="url(#ar)"/>

  <rect x="1138" y="350" width="354" height="86" rx="10" fill="#FFFFFF" stroke="#D8DBE1" filter="url(#sh)"/>
  <text x="1158" y="374" font-size="13" font-weight="600" fill="#181F2F">Implicit prefix cache</text>
  <text x="1158" y="394" font-size="11.5" fill="#5A6478">explicit cachedContents → 404 on Express</text>
  <text x="1158" y="412" font-size="11.5" fill="#5A6478">implicit caching → measured, best-effort</text>
  <text x="1158" y="429" font-size="11.5" font-weight="600" fill="#B4530A">hit rate is a distribution, not a number</text>

  <path d="M1315,438 L1315,466" fill="none" stroke="#9AA2B1" stroke-width="1.6" marker-end="url(#ar)"/>

  <rect x="1138" y="470" width="354" height="60" rx="10" fill="#181F2F" filter="url(#shl)"/>
  <text x="1315" y="494" font-size="14" font-weight="640" fill="#FFFFFF" text-anchor="middle">generate</text>
  <text x="1315" y="514" font-size="11" fill="#FFFFFF" fill-opacity="0.66" text-anchor="middle">whole corpus in context, every query</text>

  <rect x="1138" y="556" width="354" height="152" rx="10" fill="#FFFFFF" fill-opacity="0.7" stroke="#DCE0E7"/>
  <text x="1158" y="580" font-size="11" font-weight="700" letter-spacing="1.2" fill="#8B93A3">THE TRADE</text>
  <text x="1158" y="604" font-size="12" fill="#5A6478">+ no retrieval step to get wrong</text>
  <text x="1158" y="624" font-size="12" fill="#5A6478">+ no ranking, no grader, one call</text>
  <text x="1158" y="648" font-size="12" fill="#5A6478">− cost scales with corpus, not question</text>
  <text x="1158" y="668" font-size="12" fill="#5A6478">− no passages to audit an answer against</text>
  <text x="1158" y="690" font-size="12" font-weight="600" fill="#181F2F">− stops applying once corpus &gt; context</text>

  <text x="1138" y="762" font-size="11.5" fill="#8B93A3">CAG does not degrade as a corpus</text>
  <text x="1138" y="780" font-size="11.5" fill="#8B93A3">grows — it stops being applicable.</text>

  <!-- ============ INGESTION STRIP ============ -->
  <text x="80" y="916" font-size="10.5" font-weight="700" letter-spacing="1.6" fill="#8B93A3">INGESTION</text>
  <text x="196" y="916" font-size="12.5" fill="#5A6478">upstream doc layouts churn — every source is normalized to one record shape before anything downstream sees it</text>

  <rect x="80" y="932" width="266" height="76" rx="10" fill="#FFFFFF" stroke="#D8DBE1" filter="url(#sh)"/>
  <text x="213" y="957" font-size="13" font-weight="620" fill="#181F2F" text-anchor="middle">Fetch</text>
  <text x="213" y="976" font-size="11" fill="#5A6478" text-anchor="middle">llms-full.txt + sparse clone</text>
  <text x="213" y="993" font-size="11" fill="#5A6478" text-anchor="middle">1031 documents</text>

  <path d="M352,970 L386,970" fill="none" stroke="#9AA2B1" stroke-width="1.6" marker-end="url(#ar)"/>

  <rect x="392" y="932" width="266" height="76" rx="10" fill="#FFFFFF" stroke="#D8DBE1" filter="url(#sh)"/>
  <text x="525" y="957" font-size="13" font-weight="620" fill="#181F2F" text-anchor="middle">Chunk</text>
  <text x="525" y="976" font-size="11" fill="#5A6478" text-anchor="middle">header-split, then size-cap</text>
  <text x="525" y="993" font-size="11" fill="#5A6478" text-anchor="middle">10,250 chunks</text>

  <path d="M664,970 L698,970" fill="none" stroke="#9AA2B1" stroke-width="1.6" marker-end="url(#ar)"/>

  <rect x="704" y="932" width="266" height="76" rx="10" fill="#FFFFFF" stroke="#D8DBE1" filter="url(#sh)"/>
  <text x="837" y="957" font-size="13" font-weight="620" fill="#181F2F" text-anchor="middle">Embed</text>
  <text x="837" y="976" font-size="11" fill="#5A6478" text-anchor="middle">local ONNX · bge-small · 384d</text>
  <text x="837" y="993" font-size="11" fill="#5A6478" text-anchor="middle">no API key, no cost</text>

  <path d="M976,970 L1010,970" fill="none" stroke="#1D4FD7" stroke-width="1.6" marker-end="url(#arc)"/>

  <rect x="1016" y="932" width="504" height="76" rx="10" fill="#FFFFFF" stroke="#1D4FD7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="1268" y="957" font-size="13" font-weight="640" fill="#1D4FD7" text-anchor="middle">Index · Azure AI Search (free tier)</text>
  <text x="1268" y="976" font-size="11" fill="#5A6478" text-anchor="middle">sources interleaved so a truncated upload still covers every source</text>
  <text x="1268" y="993" font-size="11" fill="#5A6478" text-anchor="middle">10,250 documents · hybrid + semantic</text>

  <!-- footer band -->
  <rect x="80" y="1048" width="1440" height="56" rx="10" fill="#FFFFFF" fill-opacity="0.72" stroke="#C9CEDA" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="104" y="1072" font-size="10.5" font-weight="700" letter-spacing="1.5" fill="#8B93A3">COST CONTROL</text>
  <text x="104" y="1091" font-size="13.5" font-weight="600" fill="#181F2F">Thinking is a dial</text>
  <text x="256" y="1083" font-size="13" fill="#5A6478">Router, grader and rewriter run with reasoning off; only synthesis and the judge keep it. Per-session spend cap is checked before the model is called, never after.</text>

  <text x="80" y="1152" font-size="11.5" fill="#8B93A3">Gemini 3.5 Flash via Vertex AI · LangGraph orchestration · LlamaIndex chunking · Azure AI Search retrieval</text>
</svg>
